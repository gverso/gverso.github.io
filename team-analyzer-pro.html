<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Verso Team Analyzer PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1565C0;--blue-l:#1976D2;--blue-d:#0D47A1;
  --yellow:#FFD600;--white:#fff;--gray:#f4f6fb;--gray2:#e4e9f2;
  --text:#1a2340;--text2:#4a5568;--shadow:0 4px 24px rgba(21,101,192,0.10);
  --green:#2e7d32;--orange:#E65100;--red:#c62828;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}

.header{background:var(--blue-d);padding:22px 24px 18px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,214,0,0.07);}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.header-left{}
.badge{background:var(--yellow);color:var(--blue-d);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;text-transform:uppercase;display:inline-block;margin-bottom:6px;}
.header-title{font-size:28px;font-weight:900;color:#fff;line-height:1;}
.header-title span{color:var(--yellow);}
.header-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;}
.accent-bar{height:4px;background:linear-gradient(90deg,var(--yellow) 0%,var(--yellow) 40%,transparent 100%);}

.main{max-width:1200px;margin:0 auto;padding:24px 16px;}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--white);border-radius:12px;padding:4px;box-shadow:var(--shadow);margin-bottom:20px;overflow-x:auto;}
.tab{flex:1;padding:10px 8px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);border-radius:8px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.tab.active{background:var(--blue);color:#fff;}
.tab:hover:not(.active){background:var(--gray);}

/* Slot tabs */
.slot-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.slot-tab{padding:8px 14px;border-radius:10px;border:2px solid var(--gray2);background:var(--white);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;color:var(--text2);display:flex;align-items:center;gap:6px;}
.slot-tab.active{border-color:var(--blue);background:var(--blue);color:#fff;}
.slot-tab.filled{border-color:var(--blue-l);}
.slot-tab img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated;}

/* Card */
.card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--gray2);}

/* Form */
.form-row{display:grid;gap:10px;margin-bottom:10px;}
.form-row.cols2{grid-template-columns:1fr 1fr;}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-row.cols4{grid-template-columns:1fr 1fr 1fr 1fr;}

label{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:4px;}

input[type=text],input[type=number],select{
  width:100%;padding:10px 12px;border:1.5px solid var(--gray2);border-radius:9px;
  font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text);background:var(--white);
  outline:none;transition:border-color 0.2s;
}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--blue-l);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.stat-block{background:var(--gray);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-final{font-size:20px;font-weight:900;color:var(--blue);font-family:'Rajdhani',sans-serif;}
.stat-input-row{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.stat-input-row input{text-align:center;font-size:11px;padding:4px 4px;}
.stat-sub{font-family:'Rajdhani',sans-serif;font-size:9px;color:#bbb;letter-spacing:0.5px;}

/* Moves */
.moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.move-slot{background:var(--gray);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;}
.move-num{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#bbb;width:16px;}
.move-slot input{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--gray2);border-radius:0;padding:4px 0;font-size:13px;}
.move-slot input:focus{border-bottom-color:var(--blue);}
.type-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Pokemon header in editor */
.poke-header{display:flex;align-items:center;gap:16px;padding:14px;background:var(--gray);border-radius:12px;margin-bottom:16px;}
.poke-sprite{width:72px;height:72px;object-fit:contain;image-rendering:pixelated;}
.poke-info-name{font-size:22px;font-weight:900;text-transform:capitalize;color:var(--text);}
.poke-types{display:flex;gap:5px;margin-top:4px;}
.type-badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:10px;color:#fff;}
.poke-bst{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--text2);margin-top:4px;}

/* Analysis */
.analysis-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.analysis-card{background:var(--white);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.analysis-card.full{grid-column:1/-1;}
.a-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}

.score-big{text-align:center;padding:24px 0;}
.score-ring{width:100px;height:100px;border-radius:50%;background:conic-gradient(var(--yellow) var(--pct), var(--gray2) 0);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;position:relative;}
.score-ring-inner{width:72px;height:72px;border-radius:50%;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--blue-d);}
.score-txt{font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text2);letter-spacing:1px;}
.score-label{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text);}

.weakness-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:7px;margin-bottom:4px;}
.weakness-row:nth-child(odd){background:var(--gray);}
.wtype{display:flex;align-items:center;gap:6px;font-size:13px;text-transform:capitalize;}
.wdot{width:9px;height:9px;border-radius:50%;}
.wcount{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;}

.coverage-pills{display:flex;flex-wrap:wrap;gap:4px;}
.cov-pill{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:8px;color:#fff;}
.cov-pill.miss{opacity:0.2;}

.team-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;margin-bottom:6px;background:var(--gray);}
.team-row img{width:44px;height:44px;object-fit:contain;image-rendering:pixelated;}
.team-row-name{font-size:14px;font-weight:700;text-transform:capitalize;flex:1;}
.team-row-stats{display:flex;gap:6px;}
.mini-stat{font-family:'Rajdhani',sans-serif;font-size:11px;background:var(--blue);color:#fff;padding:2px 6px;border-radius:6px;}

.suggestion{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--gray2);font-size:13px;color:var(--text2);line-height:1.5;}
.suggestion:last-child{border-bottom:none;}

/* Buttons */
.btn{padding:12px 22px;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-l);}
.btn-yellow{background:var(--yellow);color:var(--blue-d);}
.btn-yellow:hover{background:var(--yellow-light,#FFEA00);}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn-danger{background:#ffebee;color:var(--red);}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

.search-row{display:flex;gap:8px;margin-bottom:14px;}
.search-row input{flex:1;}

/* Team overview */
.team-overview{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px;}
.ov-slot{background:var(--white);border-radius:12px;padding:12px 6px;text-align:center;box-shadow:var(--shadow);border:2px solid transparent;position:relative;cursor:pointer;transition:all 0.15s;}
.ov-slot.active{border-color:var(--yellow);}
.ov-slot.filled{border-color:var(--blue-l);}
.ov-slot:hover{transform:translateY(-2px);}
.ov-slot img{width:60px;height:60px;object-fit:contain;image-rendering:pixelated;}
.ov-name{font-size:11px;font-weight:700;text-transform:capitalize;margin-top:4px;color:var(--text);}
.ov-empty{color:#ccc;font-size:24px;margin:18px 0 10px;}
.ov-num{position:absolute;top:5px;left:7px;font-family:'Rajdhani',sans-serif;font-size:9px;color:#ccc;}
.ov-remove{position:absolute;top:4px;right:6px;background:none;border:none;color:#ddd;cursor:pointer;font-size:12px;}
.ov-remove:hover{color:var(--red);}

.loading{display:none;text-align:center;padding:30px;color:var(--blue);font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:1px;}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

.footer{background:var(--blue-d);padding:14px 24px;text-align:center;}
.footer-text{font-family:'Rajdhani',sans-serif;font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:1px;}
.footer-text span{color:var(--yellow);font-weight:700;}

.nature-effect{font-size:11px;color:var(--text2);margin-top:4px;font-style:italic;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="badge">G-Verso</div>
      <div class="header-title">Team <span>Analyzer</span> PRO</div>
      <div class="header-sub">IVs · EVs · Natureza · Moveset · Análise Completa</div>
    </div>
  </div>
</div>
<div class="accent-bar"></div>

<div class="main">

  <!-- Team overview -->
  <div class="team-overview" id="teamOverview"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('editor')">✏️ Editor</div>
    <div class="tab" onclick="switchTab('analysis')">📊 Análise</div>
  </div>

  <!-- Editor Tab -->
  <div id="tabEditor">

    <div class="card">
      <div class="card-title">Adicionar Pokémon</div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Nome em inglês (ex: garchomp, clefable...)" />
        <button class="btn btn-primary" onclick="addPokemon()">+ Adicionar</button>
      </div>
    </div>

    <div id="editorArea" style="display:none">

      <!-- Pokemon header -->
      <div id="pokeHeader"></div>

      <!-- Nature + Item + Ability -->
      <div class="card">
        <div class="card-title">Configuração</div>
        <div class="form-row cols3">
          <div>
            <label>Natureza</label>
            <select id="selNature" onchange="updateStats()"></select>
            <div class="nature-effect" id="natureEffect"></div>
          </div>
          <div>
            <label>Item</label>
            <input type="text" id="inpItem" placeholder="ex: choice scarf" oninput="saveField('item')"/>
          </div>
          <div>
            <label>Habilidade</label>
            <input type="text" id="inpAbility" placeholder="ex: speed boost" oninput="saveField('ability')"/>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="card-title">Stats (IVs / EVs / Final)</div>
        <div class="stats-grid" id="statsGrid"></div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
          <span style="font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--text2)">EVs usados:</span>
          <span id="evTotal" style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--blue)">0</span>
          <span style="font-family:'Rajdhani',sans-serif;font-size:12px;color:#bbb">/ 510</span>
        </div>
      </div>

      <!-- Moves -->
      <div class="card">
        <div class="card-title">Moveset</div>
        <div class="moves-grid" id="movesGrid"></div>
      </div>

    </div>
  </div>

  <!-- Analysis Tab -->
  <div id="tabAnalysis" style="display:none">
    <div class="loading" id="loading"><span class="spinner"></span>Analisando time...</div>
    <div id="analysisContent"></div>
  </div>

</div>

<div class="footer">
  <div class="footer-text">Desenvolvido pela <span>G-Verso</span> · Dados: PokéAPI</div>
</div>

<script>
const NATURES = {
  Hardy:{},Lonely:{atk:1.1,def:0.9},Brave:{atk:1.1,spd:0.9},Adamant:{atk:1.1,spa:0.9},
  Naughty:{atk:1.1,spdef:0.9},Bold:{def:1.1,atk:0.9},Docile:{},Relaxed:{def:1.1,spd:0.9},
  Impish:{def:1.1,spa:0.9},Lax:{def:1.1,spdef:0.9},Timid:{spd:1.1,atk:0.9},
  Hasty:{spd:1.1,def:0.9},Serious:{},Jolly:{spd:1.1,spa:0.9},Naive:{spd:1.1,spdef:0.9},
  Modest:{spa:1.1,atk:0.9},Mild:{spa:1.1,def:0.9},Quiet:{spa:1.1,spd:0.9},
  Bashful:{},Rash:{spa:1.1,spdef:0.9},Calm:{spdef:1.1,atk:0.9},Gentle:{spdef:1.1,def:0.9},
  Sassy:{spdef:1.1,spd:0.9},Careful:{spdef:1.1,spa:0.9},Quirky:{}
};

const STAT_KEYS = ['hp','attack','defense','special-attack','special-defense','speed'];
const STAT_ABBR = {hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SpA','special-defense':'SpD',speed:'SPD'};
const NATURE_KEY = {atk:'attack',def:'defense',spa:'special-attack',spdef:'special-defense',spd:'speed'};

const TYPE_COLORS = {
  normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',grass:'#78C850',
  ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',ground:'#E0C068',flying:'#A890F0',
  psychic:'#F85888',bug:'#A8B820',rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',
  dark:'#705848',steel:'#B8B8D0',fairy:'#EE99AC'
};

const TYPE_CHART = {
  normal:{rock:0.5,ghost:0,steel:0.5},
  fire:{fire:0.5,water:0.5,grass:2,ice:2,rock:0.5,bug:2,dragon:0.5,steel:2},
  water:{fire:2,water:0.5,grass:0.5,ground:2,rock:2,dragon:0.5},
  electric:{water:2,electric:0.5,grass:0.5,ground:0,flying:2,dragon:0.5},
  grass:{fire:0.5,water:2,grass:0.5,poison:0.5,ground:2,flying:0.5,bug:0.5,rock:2,dragon:0.5,steel:0.5},
  ice:{fire:0.5,water:0.5,grass:2,ice:0.5,ground:2,flying:2,dragon:2,steel:0.5},
  fighting:{normal:2,ice:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,rock:2,ghost:0,dark:2,steel:2,fairy:0.5},
  poison:{grass:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0,fairy:2},
  ground:{fire:2,electric:2,grass:0.5,poison:2,flying:0,bug:0.5,rock:2,steel:2},
  flying:{electric:0.5,grass:2,fighting:2,bug:2,rock:0.5,steel:0.5},
  psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5},
  bug:{fire:0.5,grass:2,fighting:0.5,flying:0.5,psychic:2,ghost:0.5,dark:2,steel:0.5,fairy:0.5},
  rock:{fire:2,ice:2,fighting:0.5,ground:0.5,flying:2,bug:2,steel:0.5},
  ghost:{normal:0,fighting:0,poison:0.5,bug:0.5,ghost:2,dark:0.5},
  dragon:{dragon:2,steel:0.5,fairy:0},
  dark:{fighting:0.5,psychic:2,ghost:2,dark:0.5,fairy:0.5},
  steel:{fire:0.5,water:0.5,electric:0.5,ice:2,rock:2,steel:0.5,fairy:2},
  fairy:{fire:0.5,fighting:2,poison:0.5,dragon:2,dark:2,steel:0.5}
};

let team = [];
let activeSlot = -1;
let currentTab = 'editor';

// Nature select
function buildNatureSelect() {
  const sel = document.getElementById('selNature');
  sel.innerHTML = Object.keys(NATURES).map(n => `<option value="${n}">${n}</option>`).join('');
}

function calcStat(stat, base, iv, ev, level, nature, isHP) {
  iv = parseInt(iv)||31; ev = parseInt(ev)||0; level = level||50;
  if (isHP) return Math.floor(((2*base + iv + Math.floor(ev/4)) * level / 100) + level + 10);
  let val = Math.floor(((2*base + iv + Math.floor(ev/4)) * level / 100) + 5);
  if (nature > 1) val = Math.floor(val * 1.1);
  else if (nature < 1) val = Math.floor(val * 0.9);
  return val;
}

function getNatureMult(natureName, statKey) {
  const n = NATURES[natureName] || {};
  for (const [k, v] of Object.entries(n)) {
    if (NATURE_KEY[k] === statKey) return v;
  }
  return 1;
}

function updateStats() {
  if (activeSlot < 0 || !team[activeSlot]) return;
  const p = team[activeSlot];
  const nature = document.getElementById('selNature').value;
  p.nature = nature;

  const n = NATURES[nature];
  let effectTxt = '';
  if (n && Object.keys(n).length) {
    const up = Object.entries(n).filter(([,v])=>v>1).map(([k])=>STAT_ABBR[NATURE_KEY[k]]);
    const dn = Object.entries(n).filter(([,v])=>v<1).map(([k])=>STAT_ABBR[NATURE_KEY[k]]);
    if (up.length) effectTxt = `+${up[0]} / −${dn[0]}`;
  } else { effectTxt = 'Neutro'; }
  document.getElementById('natureEffect').textContent = effectTxt;

  renderStats();
}

function renderStats() {
  if (activeSlot < 0 || !team[activeSlot]) return;
  const p = team[activeSlot];
  const nature = p.nature || 'Hardy';
  const grid = document.getElementById('statsGrid');
  let evTotal = 0;

  grid.innerHTML = STAT_KEYS.map((sk, i) => {
    const base = p.baseStats[sk] || 0;
    const iv = p.ivs[sk] !== undefined ? p.ivs[sk] : 31;
    const ev = p.evs[sk] || 0;
    const isHP = sk === 'hp';
    const mult = isHP ? 1 : getNatureMult(nature, sk);
    const final = calcStat(sk, base, iv, ev, 50, mult, isHP);
    evTotal += ev;
    const pct = Math.round(final / 4);
    const col = final >= 150 ? 'var(--green)' : final >= 100 ? 'var(--blue)' : final >= 70 ? 'var(--orange)' : 'var(--red)';
    return `<div class="stat-block">
      <div class="stat-label">${STAT_ABBR[sk]}</div>
      <div style="font-size:9px;color:#bbb;margin-bottom:2px">base ${base}</div>
      <div class="stat-final" style="color:${col}">${final}</div>
      <div style="height:4px;background:var(--gray2);border-radius:4px;margin:5px 0">
        <div style="height:4px;background:${col};border-radius:4px;width:${Math.min(100,pct)}%"></div>
      </div>
      <div class="stat-input-row">
        <div class="stat-sub">IV</div>
        <input type="number" min="0" max="31" value="${iv}" oninput="setIV('${sk}',this.value)" />
        <div class="stat-sub">EV</div>
        <input type="number" min="0" max="252" value="${ev}" oninput="setEV('${sk}',this.value)" />
      </div>
    </div>`;
  }).join('');

  document.getElementById('evTotal').textContent = evTotal;
  if (evTotal > 510) document.getElementById('evTotal').style.color = 'var(--red)';
  else document.getElementById('evTotal').style.color = 'var(--blue)';
}

function setIV(sk, val) {
  if (activeSlot < 0) return;
  team[activeSlot].ivs[sk] = Math.max(0, Math.min(31, parseInt(val)||0));
  renderStats();
}

function setEV(sk, val) {
  if (activeSlot < 0) return;
  team[activeSlot].evs[sk] = Math.max(0, Math.min(252, parseInt(val)||0));
  renderStats();
}

function saveField(field) {
  if (activeSlot < 0) return;
  if (field === 'item') team[activeSlot].item = document.getElementById('inpItem').value;
  if (field === 'ability') team[activeSlot].ability = document.getElementById('inpAbility').value;
}

function renderMoves() {
  if (activeSlot < 0 || !team[activeSlot]) return;
  const p = team[activeSlot];
  const grid = document.getElementById('movesGrid');
  grid.innerHTML = [0,1,2,3].map(i => {
    const mv = p.moves[i] || '';
    return `<div class="move-slot">
      <span class="move-num">${i+1}</span>
      <input type="text" value="${mv}" placeholder="ex: earthquake" oninput="setMove(${i},this.value)" />
    </div>`;
  }).join('');
}

function setMove(i, val) {
  if (activeSlot < 0) return;
  team[activeSlot].moves[i] = val;
}

function renderPokeHeader() {
  if (activeSlot < 0 || !team[activeSlot]) return;
  const p = team[activeSlot];
  const typePills = p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('');
  document.getElementById('pokeHeader').innerHTML = `
    <div class="card poke-header">
      <img class="poke-sprite" src="${p.sprite}" alt="${p.name}">
      <div>
        <div class="poke-info-name">${p.name}</div>
        <div class="poke-types">${typePills}</div>
        <div class="poke-bst">BST: ${Object.values(p.baseStats).reduce((a,b)=>a+b,0)}</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-danger btn-sm" onclick="removeSlot(${activeSlot})">Remover</button>
      </div>
    </div>`;
}

function renderEditor() {
  if (activeSlot < 0 || !team[activeSlot]) {
    document.getElementById('editorArea').style.display = 'none';
    return;
  }
  document.getElementById('editorArea').style.display = 'block';
  const p = team[activeSlot];
  renderPokeHeader();
  document.getElementById('selNature').value = p.nature || 'Hardy';
  document.getElementById('inpItem').value = p.item || '';
  document.getElementById('inpAbility').value = p.ability || '';
  updateStats();
  renderMoves();
}

function renderOverview() {
  const grid = document.getElementById('teamOverview');
  grid.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'ov-slot' + (team[i] ? ' filled' : '') + (i === activeSlot ? ' active' : '');
    el.onclick = () => selectSlot(i);
    if (team[i]) {
      el.innerHTML = `<span class="ov-num">#${i+1}</span>
        <button class="ov-remove" onclick="event.stopPropagation();removeSlot(${i})">✕</button>
        <img src="${team[i].sprite}" alt="${team[i].name}">
        <div class="ov-name">${team[i].name}</div>`;
    } else {
      el.innerHTML = `<span class="ov-num">#${i+1}</span><div class="ov-empty">+</div><div class="ov-name" style="color:#ccc">Vazio</div>`;
    }
    grid.appendChild(el);
  }
}

function selectSlot(i) {
  if (!team[i]) return;
  activeSlot = i;
  renderOverview();
  renderEditor();
}

function removeSlot(i) {
  team.splice(i, 1);
  activeSlot = team.length > 0 ? Math.min(i, team.length - 1) : -1;
  renderOverview();
  renderEditor();
}

async function addPokemon() {
  if (team.length >= 6) { alert('Time completo!'); return; }
  const name = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!name) return;
  if (team.find(p => p.name === name)) { alert('Já está no time!'); return; }
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon/' + name);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const baseStats = {};
    data.stats.forEach(s => baseStats[s.stat.name] = s.base_stat);
    team.push({
      name: data.name,
      types: data.types.map(t => t.type.name),
      sprite: data.sprites.other['official-artwork']?.front_default || data.sprites.front_default,
      baseStats,
      ivs: {hp:31,attack:31,defense:31,'special-attack':31,'special-defense':31,speed:31},
      evs: {hp:0,attack:0,defense:0,'special-attack':0,'special-defense':0,speed:0},
      nature: 'Hardy',
      item: '',
      ability: '',
      moves: ['','','','']
    });
    document.getElementById('searchInput').value = '';
    activeSlot = team.length - 1;
    renderOverview();
    renderEditor();
  } catch(e) {
    alert('"' + name + '" não encontrado!');
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPokemon();
});

// ANALYSIS
function getDefWeaknesses(types) {
  const res = {};
  Object.keys(TYPE_COLORS).forEach(atk => {
    let mult = 1;
    types.forEach(def => { if ((TYPE_CHART[atk]||{})[def] !== undefined) mult *= TYPE_CHART[atk][def]; });
    if (mult !== 1) res[atk] = mult;
  });
  return res;
}

function analyzeTeam() {
  if (team.length < 1) { document.getElementById('analysisContent').innerHTML = '<div class="card" style="text-align:center;color:#bbb;padding:30px;">Adicione pelo menos 2 Pokémon para analisar!</div>'; return; }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('analysisContent').innerHTML = '';

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';

    const teamWeaknesses = {};
    const teamResistances = {};
    const allTypes = Object.keys(TYPE_COLORS);

    team.forEach(p => {
      const chart = getDefWeaknesses(p.types);
      Object.entries(chart).forEach(([t, m]) => {
        if (m > 1) teamWeaknesses[t] = (teamWeaknesses[t]||0) + 1;
        else if (m < 1 && m > 0) teamResistances[t] = (teamResistances[t]||0) + 1;
      });
    });

    // Offensive coverage
    const covered = new Set();
    team.forEach(p => {
      p.types.forEach(t => {
        allTypes.forEach(def => { if ((TYPE_CHART[t]||{})[def] > 1) covered.add(def); });
      });
    });

    // Score
    const avgBST = team.reduce((s,p) => s + Object.values(p.baseStats).reduce((a,b)=>a+b,0), 0) / team.length;
    const bigWeak = Object.values(teamWeaknesses).filter(v => v >= 3).length;
    const typeVar = new Set(team.flatMap(p => p.types)).size;
    let score = 50 + Math.min(20, (avgBST-400)/10) + covered.size*1.5 + typeVar*2 - bigWeak*6;
    score = Math.max(5, Math.min(99, Math.round(score)));
    const scoreColor = score >= 75 ? '#2e7d32' : score >= 50 ? '#E65100' : '#c62828';
    const scorePct = (score / 100 * 360) + 'deg';

    const topWeak = Object.entries(teamWeaknesses).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const topRes = Object.entries(teamResistances).sort((a,b)=>b[1]-a[1]).slice(0,6);

    const suggestions = [];
    Object.entries(teamWeaknesses).filter(([,v])=>v>=3).sort((a,b)=>b[1]-a[1]).slice(0,2).forEach(([t]) => {
      suggestions.push(`⚠️ Muitas fraquezas ao tipo <strong>${t}</strong> — considere um Pokémon com resistência ou imunidade.`);
    });
    if (typeVar < 4) suggestions.push('⚠️ Pouca variedade de tipos — diversifique para melhor cobertura.');
    if (avgBST < 450) suggestions.push('📊 BST médio baixo — considere Pokémon com stats mais elevados.');
    if (covered.size < 8) suggestions.push('🎯 Cobertura ofensiva limitada — varie os tipos dos ataques.');
    if (suggestions.length === 0) suggestions.push('✅ Time bem equilibrado! Refine com held items e movesets.');

    // Calc final stats per pokemon
    const teamRows = team.map(p => {
      const nature = p.nature || 'Hardy';
      const finalSpd = calcStat('speed', p.baseStats.speed, p.ivs.speed, p.evs.speed, 50, getNatureMult(nature,'speed'), false);
      const finalAtk = calcStat('attack', p.baseStats.attack, p.ivs.attack, p.evs.attack, 50, getNatureMult(nature,'attack'), false);
      const finalHP = calcStat('hp', p.baseStats.hp, p.ivs.hp, p.evs.hp, 50, 1, true);
      return {name:p.name, sprite:p.sprite, spd:finalSpd, atk:finalAtk, hp:finalHP, nature, item:p.item, moves:p.moves.filter(m=>m)};
    });

    document.getElementById('analysisContent').innerHTML = `
      <div class="analysis-grid">

        <div class="analysis-card" style="text-align:center">
          <div class="a-title">Score do Time</div>
          <div class="score-big">
            <div class="score-ring" style="--pct:${scorePct}">
              <div class="score-ring-inner">
                <div class="score-val" style="color:${scoreColor}">${score}</div>
                <div class="score-txt">/ 99</div>
              </div>
            </div>
            <div class="score-label">${score>=75?'🔥 Excelente':score>=60?'⚡ Bom':score>=45?'⚠️ Regular':'❌ Fraco'}</div>
          </div>
        </div>

        <div class="analysis-card">
          <div class="a-title">Fraquezas do Time</div>
          ${topWeak.map(([t,c]) => `<div class="weakness-row">
            <span class="wtype"><span class="wdot" style="background:${TYPE_COLORS[t]||'#888'}"></span>${t}</span>
            <span class="wcount" style="color:${c>=3?'var(--red)':'var(--orange)'}">${c}×</span>
          </div>`).join('') || '<div style="color:#bbb;font-size:13px">Nenhuma crítica!</div>'}
        </div>

        <div class="analysis-card">
          <div class="a-title">Resistências</div>
          ${topRes.map(([t,c]) => `<div class="weakness-row">
            <span class="wtype"><span class="wdot" style="background:${TYPE_COLORS[t]||'#888'}"></span>${t}</span>
            <span class="wcount" style="color:var(--green)">${c}×</span>
          </div>`).join('') || '<div style="color:#bbb;font-size:13px">—</div>'}
        </div>

        <div class="analysis-card full">
          <div class="a-title">Cobertura Ofensiva (${covered.size}/18 tipos)</div>
          <div class="coverage-pills">
            ${allTypes.map(t => `<span class="cov-pill ${covered.has(t)?'':'miss'}" style="background:${TYPE_COLORS[t]}">${t}</span>`).join('')}
          </div>
        </div>

        <div class="analysis-card full">
          <div class="a-title">Stats do Time (Nível 50)</div>
          ${teamRows.map(p => `<div class="team-row">
            <img src="${p.sprite}" alt="${p.name}">
            <div class="team-row-name">${p.name} <span style="font-size:11px;color:#bbb;font-weight:400">${p.nature}${p.item?' · '+p.item:''}</span></div>
            <div class="team-row-stats">
              <span class="mini-stat">HP ${p.hp}</span>
              <span class="mini-stat">ATK ${p.atk}</span>
              <span class="mini-stat">SPD ${p.spd}</span>
              ${p.moves.length ? `<span class="mini-stat" style="background:var(--gray2);color:var(--text2)">${p.moves.slice(0,2).join(' · ')}</span>` : ''}
            </div>
          </div>`).join('')}
        </div>

        <div class="analysis-card full">
          <div class="a-title">Sugestões G-Verso</div>
          ${suggestions.map(s => `<div class="suggestion"><span>${s}</span></div>`).join('')}
        </div>

      </div>`;

  }, 600);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabEditor').style.display = tab === 'editor' ? 'block' : 'none';
  document.getElementById('tabAnalysis').style.display = tab === 'analysis' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='editor')||(i===1&&tab==='analysis')));
  if (tab === 'analysis') analyzeTeam();
}

buildNatureSelect();
renderOverview();
</script>
</body>
</html>
