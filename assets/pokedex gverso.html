<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pokédex G-Verso</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Exo 2', sans-serif;
}

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

#overlay.active {
  opacity: 1;
  pointer-events: all;
}

.backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

.card {
  position: relative;
  width: 860px;
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,0.6);
  transform: scale(0.9) translateY(20px);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
}

#overlay.active .card {
  transform: scale(1) translateY(0);
  opacity: 1;
}

.card-header {
  position: relative;
  height: 280px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  background: var(--type-color, #888);
}

.card-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%),
              linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.25) 100%);
}

.pokeball-deco {
  position: absolute;
  top: -60px;
  right: -60px;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 40px solid rgba(255,255,255,0.1);
}

#sprite {
  position: absolute;
  right: 60px;
  bottom: 10px;
  width: 220px;
  height: 220px;
  object-fit: contain;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.35));
  image-rendering: pixelated;
  animation: float 3s ease-in-out infinite;
  z-index: 2;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.header-info {
  position: relative;
  z-index: 2;
  padding: 0 36px 28px;
  flex: 1;
}

.poke-number {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.poke-name {
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-transform: capitalize;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  margin-bottom: 14px;
}

.type-badges { display: flex; gap: 8px; }

.type-badge {
  padding: 5px 16px;
  border-radius: 30px;
  background: rgba(255,255,255,0.22);
  border: 1.5px solid rgba(255,255,255,0.4);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.card-body { padding: 28px 36px 24px; background: #fff; }

.poke-desc {
  font-size: 15px;
  color: #555;
  line-height: 1.65;
  margin-bottom: 26px;
  font-weight: 300;
  border-left: 3px solid var(--type-color, #888);
  padding-left: 14px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  border: 1.5px solid #eee;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}

.info-item {
  padding: 14px 18px;
  border-right: 1.5px solid #eee;
  text-align: center;
}

.info-item:last-child { border-right: none; }

.info-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.info-value { font-size: 17px; font-weight: 700; color: #222; }

.stats-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #bbb;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.stat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }

.stat-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #999;
  width: 38px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.stat-num { font-size: 13px; font-weight: 700; color: #333; width: 28px; text-align: right; }

.stat-bar-bg { flex: 1; height: 7px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }

.stat-bar {
  height: 100%;
  border-radius: 10px;
  background: var(--type-color, #888);
  width: 0%;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  opacity: 0.85;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px;
  background: #1565C0;
}

.gverso-sig {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.footer-hint {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}

#loading {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

#loading.show { opacity: 1; }

.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid #eee;
  border-top-color: #1565C0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="overlay">
  <div class="backdrop" onclick="hidePokemon()"></div>
  <div class="card">
    <div id="loading"><div class="spinner"></div></div>
    <div class="card-header">
      <div class="pokeball-deco"></div>
      <img id="sprite" src="" alt="">
      <div class="header-info">
        <div class="poke-number" id="poke-number">#000</div>
        <div class="poke-name" id="poke-name">—</div>
        <div class="type-badges" id="poke-types"></div>
      </div>
    </div>
    <div class="card-body">
      <div class="poke-desc" id="poke-desc"></div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Altura</div><div class="info-value" id="poke-height">—</div></div>
        <div class="info-item"><div class="info-label">Peso</div><div class="info-value" id="poke-weight">—</div></div>
        <div class="info-item"><div class="info-label">Exp. Base</div><div class="info-value" id="poke-exp">—</div></div>
        <div class="info-item"><div class="info-label">Geração</div><div class="info-value" id="poke-gen">—</div></div>
      </div>
      <div class="stats-title">Base Stats</div>
      <div id="stats-container"></div>
    </div>
    <div class="card-footer">
      <span class="gverso-sig">Desenvolvido pela G-Verso</span>
      <span class="footer-hint">clique no fundo para fechar</span>
    </div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  normal:'#A8A878', fire:'#F08030', water:'#6890F0', electric:'#F8D030',
  grass:'#78C850', ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0',
  ground:'#E0C068', flying:'#A890F0', psychic:'#F85888', bug:'#A8B820',
  rock:'#B8A038', ghost:'#705898', dragon:'#7038F8', dark:'#705848',
  steel:'#B8B8D0', fairy:'#EE99AC'
};

const STAT_NAMES = {
  hp:'HP', attack:'ATK', defense:'DEF',
  'special-attack':'SpA', 'special-defense':'SpD', speed:'SPD'
};

let hideTimer = null;

function showLoading(v) {
  document.getElementById('loading').classList.toggle('show', v);
}

async function showPokemon(name) {
  if (!name) return;
  name = name.toLowerCase().trim().replace(/^!/, '');

  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  showLoading(true);

  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

  try {
    const r1 = await fetch('https://pokeapi.co/api/v2/pokemon/' + name);
    if (!r1.ok) throw new Error('not found');
    const data = await r1.json();

    const r2 = await fetch(data.species.url);
    const spec = await r2.json();

    const r3 = await fetch(spec.generation.url);
    const gen = await r3.json();

    const descEntry = spec.flavor_text_entries.find(e => e.language.name === 'pt') ||
                      spec.flavor_text_entries.find(e => e.language.name === 'en');
    const desc = descEntry ? descEntry.flavor_text.replace(/[\f\n\r]/g, ' ') : '';

    const mainType = data.types[0].type.name;
    const color = TYPE_COLORS[mainType] || '#888';
    document.documentElement.style.setProperty('--type-color', color);
    document.querySelector('.card-header').style.background = color;

    document.getElementById('poke-number').textContent = '#' + String(data.id).padStart(3, '0');
    document.getElementById('poke-name').textContent = data.name;
    document.getElementById('poke-desc').textContent = desc;
    document.getElementById('poke-height').textContent = (data.height / 10).toFixed(1) + ' m';
    document.getElementById('poke-weight').textContent = (data.weight / 10).toFixed(1) + ' kg';
    document.getElementById('poke-exp').textContent = data.base_experience || '—';
    document.getElementById('poke-gen').textContent = gen.name.replace('generation-', '').toUpperCase();

    const sprite = data.sprites.other['official-artwork']?.front_default || data.sprites.front_default || '';
    document.getElementById('sprite').src = sprite;

    document.getElementById('poke-types').innerHTML = data.types
      .map(t => '<span class="type-badge">' + t.type.name + '</span>').join('');

    document.getElementById('stats-container').innerHTML = data.stats.map(s => {
      const label = STAT_NAMES[s.stat.name] || s.stat.name;
      const pct = Math.min(100, Math.round(s.base_stat / 255 * 100));
      return '<div class="stat-row">' +
        '<span class="stat-name">' + label + '</span>' +
        '<span class="stat-num">' + s.base_stat + '</span>' +
        '<div class="stat-bar-bg"><div class="stat-bar" data-pct="' + pct + '"></div></div>' +
        '</div>';
    }).join('');

    showLoading(false);

    setTimeout(function() {
      document.querySelectorAll('.stat-bar').forEach(function(b) {
        b.style.width = b.getAttribute('data-pct') + '%';
      });
    }, 150);

    hideTimer = setTimeout(hidePokemon, 15000);

  } catch(e) {
    showLoading(false);
    document.getElementById('poke-name').textContent = 'Pokémon não encontrado';
    document.getElementById('poke-desc').textContent = '"' + name + '" não existe na Pokédex. Verifique o nome em inglês.';
    document.getElementById('poke-types').innerHTML = '';
    document.getElementById('stats-container').innerHTML = '';
    hideTimer = setTimeout(hidePokemon, 5000);
  }
}

function hidePokemon() {
  document.getElementById('overlay').classList.remove('active');
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
}

// Lê URL param: ?pokemon=lugia
var urlParam = new URLSearchParams(window.location.search).get('pokemon');
if (urlParam) showPokemon(urlParam);

// Expõe pro console e bots
window.showPokemon = showPokemon;
window.hidePokemon = hidePokemon;
</script>
</body>
</html>
